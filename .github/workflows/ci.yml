name: Secure Build, Sign & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  id-token: write     # Required for Sigstore keyless signing
  attestations: write # Required for GitHub Artifact Attestations

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Hardened Build
        run: bash scripts/build.sh

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Artifacts (Keyless)
        run: |
          cosign sign-blob --yes --output-signature dist/bundle.js.sig dist/bundle.js
          cosign sign-blob --yes --output-signature dist/bom.json.sig dist/bom.json

      - name: Attest Build Provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/bundle.js
            dist/bom.json

      - name: Upload Artifacts to Release
        uses: actions/upload-artifact@v4
        with:
          name: secure-calculator-bundle
          path: dist/

      - name: Deploy to GH Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
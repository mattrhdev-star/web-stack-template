name: Secure Deploy

on:
  push:
    branches: [ main ]

jobs:
  security-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Hardened Build
        run: bash scripts/build.sh

      - name: Scan for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'public/vulnerabilities.json'
          exit-code: '1' # This crashes the build if issues are found
          severity: 'CRITICAL,HIGH'
          # vex: 'security/my-project.vex.json' # Uncomment when you have a VEX file

      - name: Deploy to GH Pages
        if: success() # Only deploys if all previous security steps passed
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public